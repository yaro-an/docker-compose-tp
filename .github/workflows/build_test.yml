name: Build and Test application 

# Controls when the action will run.
on:
  #Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
# A workflow run is made up of one or more jobs that can run sequentially or in parallel

jobs:
  build_test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Build 
        uses: docker/setup-buildx-action@v3
      - name: Build image for scanning
        run: docker build -t my-app:1.0.0 -f ./api/Dockerfile .
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: my-app:1.0.0
          file: ./api/Dockerfile
          only-severities: critical
          exit-code: true

      - name: Trivy Scan MySQL image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mysql:9.6
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  integration_tests:
    runs-on: ubuntu-latest
    needs: build_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=ynov_ci" >> .env
          echo "MYSQL_USER=root" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env

          echo "MONGO_ROOT_USERNAME=root" >> .env
          echo "MONGO_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}" >> .env
          echo "MONGO_APP_USER=app_user" >> .env
          echo "MONGO_APP_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}" >> .env
          echo "MONGO_APP_DB=blog_db" >> .env

      - name: Start docker compose stack
        run: docker compose up -d --build

      - name: Show containers
        run: docker compose ps

      - name: Wait for healthy containers
        run: |
          echo "Waiting for main containers to become healthy..."

          for i in {1..24}; do
            echo "Attempt $i/24"

            docker compose ps api db_mongo db_mysql

            unhealthy=$(docker compose ps api db_mongo db_mysql --format json | jq -r 'select(.Health != "healthy") | .Name + " = " + (.Health // "no-healthcheck")' || true)

            if [ -z "$unhealthy" ]; then
              echo "Main containers are healthy"
              exit 0
            fi

            echo "Not ready yet:"
            echo "$unhealthy"
            sleep 5
          done

          echo "Containers did not become healthy in time"
          docker compose ps
          docker compose logs api
          docker compose logs db_mongo
          docker compose logs db_mysql
          exit 1


      - name: Debug docker compose
        run: |
          docker compose ps
          docker compose logs api
      - name: Test posts route
        run: curl --retry 10 --retry-delay 5 --retry-all-errors -f http://localhost:8000/posts

      - name: Test users route
        run: curl --retry 10 --retry-delay 5 --retry-all-errors -f http://localhost:8000/users

      - name: Stop docker compose stack
        if: always()
        run: docker compose down
